spring:
  datasource:
    url: ${DB_URL:jdbc:h2:file:./data/testdb}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}

  liquibase:
    change-log: classpath:db/changelog/master.xml

  h2:
    console:
      enabled: true

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

server:
  port: 8080